name: 리그 통계 수집

on:
  schedule:
    - cron: "23 0,6,12,18 * * *"   # 하루 4회 (UTC 기준, 혼잡 시간 회피)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 통계 수집 실행
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: python scripts/fetch_stats.py

      - name: 변경사항 커밋
        run: |
          git config user.name "hiwigo-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/stats.json
          git diff --cached --quiet || git commit -m "data: 리그 통계 자동 수집 $(date -u +'%Y-%m-%d %H:%M')"
          git push
