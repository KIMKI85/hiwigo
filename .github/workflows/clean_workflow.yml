name: 번역 정리 (1회성)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 의존성 설치
        run: pip install feedparser deep-translator
      - name: 번역 정리 실행
        run: python scripts/clean_translations.py
      - name: 변경사항 커밋
        run: |
          git config user.name "hiwigo-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "data: 오염 번역 정리 및 재번역"
          git push
